name: Build APK

# Runs on every push, and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17 (required by the Android Gradle Plugin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to a known-good stable that supports this code's APIs and
          # ships Dart 3.x. Bump later if you want a newer Flutter.
          flutter-version: "3.29.3"
          channel: stable
          cache: true

      - name: Generate Android platform files (gradle wrapper, icons, etc.)
        run: flutter create . --platforms=android

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (diagnostic — shows any code issues, does not block)
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload the APK so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: project-time-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
